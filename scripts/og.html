<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:630px; }
  body{
    background:#081426;
    color:#AFD6F8;
    font-family:'Archivo','Arial Black','Helvetica Neue',Arial,sans-serif;
    display:flex; flex-direction:column; justify-content:center;
    padding:96px 88px; position:relative; overflow:hidden;
  }
  .eyebrow{
    font-family:'Space Mono','Courier New',monospace;
    font-size:20px; letter-spacing:.28em; text-transform:uppercase;
    color:#5A7396; margin-bottom:40px;
  }
  h1{
    font-weight:800; text-transform:uppercase;
    font-size:118px; line-height:.9; letter-spacing:-.01em;
    transform:scaleX(1.06); transform-origin:left;
  }
  h1 .thin{
    color:transparent; -webkit-text-stroke:2px #A9D2F7;
  }
  .foot{
    position:absolute; left:88px; bottom:82px;
    font-family:'Space Mono','Courier New',monospace;
    font-size:19px; letter-spacing:.22em; text-transform:uppercase;
    color:#5A7396;
  }
  .rule{
    position:absolute; left:88px; right:88px; bottom:140px;
    height:1px; background:rgba(169,210,247,.18);
  }
</style>
</head>
<body>
  <div class="eyebrow">Independent web studio — Dubai</div>
  <h1>Sites that ship<br>in days.</h1>
  <div class="rule"></div>
  <div class="foot">EN / AR — WhatsApp — replies within hours</div>
</body>
</html>
