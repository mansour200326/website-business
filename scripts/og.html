<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:630px; }
  body{
    background:#F6F4EF;
    color:#141416;
    font-family:'Archivo','Helvetica Neue',Arial,sans-serif;
    display:flex; flex-direction:column; justify-content:center;
    padding:92px 88px; position:relative;
  }
  .eyebrow{
    font-family:'Space Mono','Courier New',monospace;
    font-size:19px; letter-spacing:.2em; text-transform:uppercase;
    color:#6E6A61; margin-bottom:40px;
  }
  h1{
    font-weight:600; font-size:76px; line-height:1.14; letter-spacing:-.02em;
    max-width:1000px;
  }
  .rule{ position:absolute; left:88px; right:88px; bottom:132px; height:1px; background:rgba(20,20,22,.18); }
  .foot{
    position:absolute; left:88px; bottom:84px; display:flex; align-items:center; gap:16px;
    font-family:'Space Mono','Courier New',monospace;
    font-size:19px; letter-spacing:.16em; text-transform:uppercase; color:#6E6A61;
  }
  .foot .dot{ width:12px; height:12px; border-radius:50%; background:#B8AF9E; }
</style>
</head>
<body>
  <div class="eyebrow">Independent web studio — Dubai</div>
  <h1>Sites that ship in days — and look like they took months.</h1>
  <div class="rule"></div>
  <div class="foot"><span class="dot"></span>Websites · Online stores · Signature builds</div>
</body>
</html>
